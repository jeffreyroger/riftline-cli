name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install riftline
        run: pip install ".[dev]"

      - name: Run test suite
        run: pytest tests/ -v

      - name: Dogfood - scan Riftline's own source
        run: riftline scan .

      - name: Dogfood - export self-graph as JSON and validate it parses
        run: |
          riftline export --format json --path . --out self_graph.json
          python -c "import json; json.load(open('self_graph.json', encoding='utf-8'))"
